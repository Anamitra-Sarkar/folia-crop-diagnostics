name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@folia.app"
          git config --global user.name "Folia Sync Bot"
          
          # Clone the Hugging Face Space repository
          git clone https://Arko007:$HF_TOKEN@huggingface.co/spaces/Arko007/folia-crop-diagnostics hf_space
          
          # Clean existing files in the Space repo except .git
          find hf_space -maxdepth 1 ! -name '.git' ! -name 'hf_space' -exec rm -rf {} +
          
          # Copy files from backend/ to hf_space/
          cp -r backend/* hf_space/
          
          # Remove any local dev environment files if they exist in hf_space
          rm -f hf_space/.env
          rm -rf hf_space/__pycache__
          rm -rf hf_space/.cache
          
          # Stage, commit and push
          cd hf_space
          git add -A
          
          # Only commit and push if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes to sync."
          else
            git commit -m "sync: auto-update backend from GitHub"
            git push origin main
          fi
