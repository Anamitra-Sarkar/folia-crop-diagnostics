name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ] || [ -z "${HF_SPACE:-}" ]; then
            echo "HF_TOKEN and HF_SPACE must both be configured as repository secrets."
            exit 1
          fi

          git config --global user.email "bot@folia.app"
          git config --global user.name "Folia Sync Bot"
          
          # Clone the Hugging Face Space repository dynamically using the HF_SPACE secret
          HF_USERNAME=$(echo "$HF_SPACE" | cut -d'/' -f1)
          git clone --depth 1 "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE" hf_space
          
          # Replace the Space contents with the backend tree only.
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='firebase-key.json' \
            --exclude='backend.log' \
            --exclude='__pycache__/' \
            --exclude='.cache/' \
            backend/ hf_space/
          
          # Stage, commit and push
          cd hf_space
          git add -A
          
          # Only commit and push if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes to sync."
          else
            git commit -m "sync: auto-update backend from GitHub"
            git push origin main
          fi
