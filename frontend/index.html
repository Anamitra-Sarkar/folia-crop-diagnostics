<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Folia — Snap a photo of your plant leaf and instantly find out what's wrong. Get disease diagnosis and care tips." />
    <title>Folia — Plant Disease Scanner</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- PWA Configurations -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <meta name="theme-color" content="#f5f3ef" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <script>
      (function() {
        const theme = localStorage.getItem('folia-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    
    <script>
      window.__foliaPWA = { prompt: null, installed: false };
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__foliaPWA.prompt = e;
        window.dispatchEvent(new Event('folia-install-ready'));
      });
      window.addEventListener('appinstalled', function() {
        window.__foliaPWA.prompt = null;
        window.__foliaPWA.installed = true;
      });
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        window.__foliaPWA.installed = true;
      }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Folia Service Worker registered:', reg.scope))
            .catch(err => console.error('Folia Service Worker registration failed:', err));
        });
      }
    </script>
    

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
