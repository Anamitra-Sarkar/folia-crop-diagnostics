<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Research-grade Adaptive Edge-Cloud Plant Disease Diagnosis and Telemetry dashboard." />
    <title>Folia — Crop Health Diagnostics</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- PWA Configurations -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <meta name="theme-color" content="#f5f3ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <script>
      (function() {
        const theme = localStorage.getItem('folia-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Folia Service Worker registered:', reg.scope))
            .catch(err => console.error('Folia Service Worker registration failed:', err));
        });
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['selector', '[data-theme="dark"]'],
        theme: {
          extend: {
            colors: {
              bg: 'var(--color-bg)',
              surface: 'var(--color-surface)',
              'surface-2': 'var(--color-surface-2)',
              border: 'var(--color-border)',
              text: 'var(--color-text)',
              'text-muted': 'var(--color-text-muted)',
              'text-faint': 'var(--color-text-faint)',
              primary: 'var(--color-primary)',
              'primary-hover': 'var(--color-primary-hover)',
              accent: 'var(--color-accent)',
              danger: 'var(--color-danger)',
              cloud: 'var(--color-cloud)',
            },
            fontFamily: {
              display: ['Fraunces', 'Georgia', 'serif'],
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
