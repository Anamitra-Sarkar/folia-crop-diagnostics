<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Research-grade Adaptive Edge-Cloud Plant Disease Diagnosis and Telemetry dashboard." />
    <title>Folia — Crop Health Diagnostics</title>
    <!-- PWA Configurations -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <meta name="theme-color" content="#090D16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Folia Service Worker registered:', reg.scope))
            .catch(err => console.error('Folia Service Worker registration failed:', err));
        });
      }
    </script>
    
    <!-- Tailwind CSS for modern glassmorphic landing and auth pages -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brandGreen: '#10B981',
              brandBlue: '#3B82F6',
              brandYellow: '#F59E0B',
              brandRed: '#EF4444',
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
